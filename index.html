<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <h1>Tic-Tac-Toe</h1>

        <div class= "mode-bar">
            <button id="mode-multiplayer" class="mode-btn" onclick="setMode('multiplayer')">Multiplayer</button>
            <button id="mode-ai" class="mode-btn active" onclick="setMode('ai')">AI</button>
        </div>

        <div class="mode-bar" id="difficulty-bar">
            <button id="diff-easy" class="mode-btn" onclick="setDifficulty('easy')">Easy</button>
            <button id="diff-impossible" class="mode-btn active"
                onclick="setDifficulty('impossible')">Impossible</button>
        </div>
        
        <div id="status">Your Turn! (O)</div>

        <div class="grid" id="board"></div>

        <button id="reset" onclick="resetGame()">Restart Game</button>
    </div>
    <script src="game.js"></script>
</body>

</html>
